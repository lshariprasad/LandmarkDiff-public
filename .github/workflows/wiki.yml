name: Deploy Wiki
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['docs/wiki/**']
permissions:
  contents: write
jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push wiki pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki-dir 2>/dev/null || {
            echo "::error::Wiki not initialized. Create the first page at https://github.com/${{ github.repository }}/wiki/_new then re-run."
            exit 1
          }
          cd wiki-dir
          rm -f *.md
          cp ../docs/wiki/*.md .
          git config user.name "dreamlessx"
          git config user.email "dreamlessx@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes."
          else
            git commit -m "update wiki pages"
            git push origin master
            echo "Wiki updated."
          fi
