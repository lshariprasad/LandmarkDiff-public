name: Deploy Wiki

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Push wiki pages
        env:
          GH_TOKEN: ${{ secrets.WIKI_PAT }}
        run: |
          REPO="${{ github.repository }}"
          CLONE_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"

          if ! git clone "$CLONE_URL" wiki-dir 2>/dev/null; then
            echo "::error::Wiki not initialized. Create the first page at https://github.com/${REPO}/wiki/_new then re-run this workflow."
            exit 1
          fi

          cd wiki-dir
          rm -f *.md
          cp ../docs/wiki/*.md .
          git config user.name "dreamlessx"
          git config user.email "dreamlessx@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes to push."
          else
            git commit -m "update wiki pages"
            git push origin master
            echo "Wiki updated successfully."
          fi
