name: Initialize Wiki
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        env:
          WIKI_DIR: docs/wiki/
          GH_TOKEN: ${{ secrets.WIKI_TOKEN }}
          GH_MAIL: dreamlessx@users.noreply.github.com
          GH_NAME: dreamlessx
          WIKI_PUSH_MESSAGE: "add comprehensive wiki documentation"
