name: Deploy Wiki
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["docs/wiki/**"]
permissions:
  contents: write
jobs:
  wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push wiki pages
        env:
          GH_TOKEN: ${{ secrets.WIKI_PAT }}
        run: |
          REPO="${{ github.repository }}"
          CLONE_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.wiki.git"
          
          if git clone "$CLONE_URL" wiki-dir 2>/dev/null; then
            echo "Cloned existing wiki repo"
            cd wiki-dir
            rm -f *.md
          else
            echo "Wiki repo does not exist, bootstrapping..."
            mkdir -p wiki-dir
            cd wiki-dir
            git init
            git remote add origin "$CLONE_URL"
          fi
          
          cp ../docs/wiki/*.md .
          git config user.name "dreamlessx"
          git config user.email "dreamlessx@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes."
          else
            git commit -m "update wiki pages"
            git branch -M master
            git push -u origin master --force
            echo "Wiki updated successfully."
          fi
